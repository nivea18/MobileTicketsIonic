<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Cliente</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card>
    <ion-card-header>
      <ion-item lines="none">
        <ion-label slot="start">Senha:</ion-label>
        <ion-text color="dark">
          <h2 style="font-weight: bold; font-size: 22px;">
            {{ senhasService.inputNovaSenha }}
          </h2>
        </ion-text>
      </ion-item>
    </ion-card-header>

    <ion-card-content>
      <ion-button expand="block" (click)="senhasService.novaSenha('SG')">Senha Geral</ion-button>
      <ion-button expand="block" (click)="senhasService.novaSenha('SP')">Senha Prioritária</ion-button>
      <ion-button expand="block" (click)="senhasService.novaSenha('SE')">Senha Exame</ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
