<ion-header>
  <ion-toolbar color="success">
    <ion-title>Atendente</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card class="ion-text-center">
    <ion-card-header>
      <ion-card-title>SENHA ATUAL</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <h1 style="font-size: 3em; color: var(--ion-color-success);">
        {{ senhasService.senhaAtual || '---' }}
      </h1>
      <ion-button expand="block" (click)="senhasService.proximaSenha()">
        CHAMAR PRÓXIMO
      </ion-button>
    </ion-card-content>
  </ion-card>

  <ion-list>
    <ion-list-header>Últimas 5 Chamadas</ion-list-header>
    <ion-item *ngFor="let s of senhasService.ultimasChamadas">
      <ion-label>{{ s }}</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
